name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "book.toml"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-mermaid
      # Generates the mermaid JS assets into docs/ (gitignored; the
      # preprocessor and additional-js entries live in book.toml).
      - run: mdbook-mermaid install .
      - run: mdbook build
      # Requires Pages to be enabled once in the repo settings with
      # source = "GitHub Actions".
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
