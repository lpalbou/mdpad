name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets --locked
      - run: cargo build --release --locked
      # Table-regression tripwire: narrow-width render of the motivating
      # fixture must not overflow (also exercised by integration tests).
      - name: Narrow-width smoke render
        shell: bash
        run: |
          NO_COLOR=1 ./target/release/mdpad -p -w 60 tests/fixtures/report.md > /dev/null
          ./target/release/mdpad -p -w 80 --color always tests/fixtures/showcase.md > /dev/null

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  # The release workflow builds musl targets; build one here so they can't
  # rot silently between releases.
  musl:
    name: musl build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --locked --target x86_64-unknown-linux-musl
      - run: ./target/x86_64-unknown-linux-musl/release/mdpad -p -w 80 tests/fixtures/report.md > /dev/null
